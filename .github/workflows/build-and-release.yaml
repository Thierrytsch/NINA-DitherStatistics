name: Build and Release

on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write

env:
  PLUGIN_NAME: "Dither Statistics"
  PLUGIN_SLN_NAME: "DitherStatistics"
  PLUGIN_DLL_NAME: "ThierryTschanz.NINA.Ditherstatistics"
  PLUGIN_MANIFEST_PATH: "d/Dither Statistics"

jobs:
  build-and-release:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # The csproj is the single source of truth for the version. CreateManifest.ps1
      # reads the version from the compiled DLL, so the tag must match the csproj.
      - name: Verify tag matches csproj version
        shell: pwsh
        run: |
          [xml]$csproj = Get-Content "${{ env.PLUGIN_SLN_NAME }}.csproj"
          $version = ($csproj.Project.PropertyGroup.Version | Where-Object { $_ }) | Select-Object -First 1
          if ($version -ne "${{ github.ref_name }}") {
            Write-Error "Tag '${{ github.ref_name }}' does not match csproj <Version> '$version'. Update the csproj (Version/AssemblyVersion/FileVersion) before tagging."
            exit 1
          }

      - name: Prepare folders
        run: |
          mkdir packages
          mkdir "packages/${{ env.PLUGIN_NAME }}"

      - name: Build .NET Assemblies
        run: |
          dotnet restore
          dotnet build "${{ env.PLUGIN_SLN_NAME }}.sln" -c Release -o ./bin/Release

      - name: Run tests
        run: dotnet test "${{ env.PLUGIN_SLN_NAME }}.sln" -c Release

      - name: Prepare package
        run: |
          Copy-Item "bin/Release/${{ env.PLUGIN_DLL_NAME }}.dll"       "packages/${{ env.PLUGIN_NAME }}/" -Force
          Copy-Item "bin/Release/${{ env.PLUGIN_DLL_NAME }}.pdb"       "packages/${{ env.PLUGIN_NAME }}/" -Force
          Copy-Item "bin/Release/${{ env.PLUGIN_DLL_NAME }}.deps.json" "packages/${{ env.PLUGIN_NAME }}/" -Force
          Copy-Item "bin/Release/ScottPlot.dll"                        "packages/${{ env.PLUGIN_NAME }}/" -Force
          Copy-Item "bin/Release/ScottPlot.WPF.dll"                    "packages/${{ env.PLUGIN_NAME }}/" -Force

      - name: Create Plugin archive and manifest
        run: |
          curl -LO https://raw.githubusercontent.com/isbeorn/nina.plugin.manifests/refs/heads/main/tools/CreateManifest.ps1?raw=true
          pwsh CreateManifest.ps1 -file "packages/${{ env.PLUGIN_NAME }}/${{ env.PLUGIN_DLL_NAME }}.dll" -installerUrl "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${{ env.PLUGIN_DLL_NAME }}.${{ github.ref_name }}.zip" -createArchive -includeAll
          Rename-Item -Path "manifest.json" -NewName "${{ env.PLUGIN_DLL_NAME }}.${{ github.ref_name }}.manifest.json"
          Rename-Item -Path "${{ env.PLUGIN_DLL_NAME }}.zip" -NewName "${{ env.PLUGIN_DLL_NAME }}.${{ github.ref_name }}.zip"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: |
            ./${{ env.PLUGIN_DLL_NAME }}.${{ github.ref_name }}.zip
            ./${{ env.PLUGIN_DLL_NAME }}.${{ github.ref_name }}.manifest.json

      - name: Upload manifest artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-manifest
          path: ${{ env.PLUGIN_DLL_NAME }}.${{ github.ref_name }}.manifest.json

  publish-manifest:
    runs-on: ubuntu-latest
    needs: build-and-release
    steps:
      - name: Download manifest artifact
        uses: actions/download-artifact@v4
        with:
          name: plugin-manifest

      - name: Sanitize PLUGIN_NAME
        run: echo "PLUGIN_NAME_SANITIZED=${PLUGIN_NAME//[[:space:]]/}" >> $GITHUB_ENV

      # Branch off upstream/main so the fork's state doesn't matter and the
      # resulting branch contains only the new manifest.
      - name: Clone manifest fork and create branch
        run: |
          git clone https://x-access-token:${{ secrets.PAT }}@github.com/${{ github.repository_owner }}/nina.plugin.manifests.git
          cd nina.plugin.manifests
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote add upstream https://github.com/isbeorn/nina.plugin.manifests.git
          git fetch upstream main
          git checkout -b "${PLUGIN_NAME_SANITIZED}/${{ github.ref_name }}" upstream/main

      - name: Copy manifest into version folder
        run: |
          mkdir -p "./nina.plugin.manifests/manifests/${{ env.PLUGIN_MANIFEST_PATH }}/${{ github.ref_name }}"
          cp "./${{ env.PLUGIN_DLL_NAME }}.${{ github.ref_name }}.manifest.json" "./nina.plugin.manifests/manifests/${{ env.PLUGIN_MANIFEST_PATH }}/${{ github.ref_name }}/manifest.json"
          cd nina.plugin.manifests
          git add .
          git commit -m "Add manifest for ${{ env.PLUGIN_NAME }} ${{ github.ref_name }}"
          git push origin "${PLUGIN_NAME_SANITIZED}/${{ github.ref_name }}"

      # The automatic pull request against isbeorn/nina.plugin.manifests is
      # currently disabled — the manifest branch is pushed to the fork, the PR
      # is created manually on GitHub. To re-enable, uncomment the step below.
      #
      # - name: Create pull request
      #   shell: bash
      #   run: |
      #     echo "${{ secrets.PAT }}" | gh auth login --with-token
      #     gh pr create \
      #       --title "Add manifest for ${{ env.PLUGIN_NAME }} ${{ github.ref_name }}" \
      #       --body "Automatically generated manifest for ${{ env.PLUGIN_NAME }} release ${{ github.ref_name }}" \
      #       --head "${{ github.repository_owner }}:${PLUGIN_NAME_SANITIZED}/${{ github.ref_name }}" \
      #       --base main \
      #       --repo isbeorn/nina.plugin.manifests
